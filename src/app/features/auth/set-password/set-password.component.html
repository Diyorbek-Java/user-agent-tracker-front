<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Set Your Password</h1>
      <p>First-time login for <strong>{{ email }}</strong>. Choose a new password to continue.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input
          type="password"
          id="new_password"
          formControlName="new_password"
          class="form-control"
          [class.is-invalid]="newPassword?.invalid && newPassword?.touched"
          placeholder="At least 8 characters"
        />
        <div *ngIf="newPassword?.invalid && newPassword?.touched" class="error-message">
          <span *ngIf="newPassword?.errors?.['required']">Password is required</span>
          <span *ngIf="newPassword?.errors?.['minlength']">Must be at least 8 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          formControlName="confirm_password"
          class="form-control"
          [class.is-invalid]="(confirmPassword?.invalid && confirmPassword?.touched) || (form.errors?.['mismatch'] && confirmPassword?.touched)"
          placeholder="Re-enter password"
        />
        <div *ngIf="form.errors?.['mismatch'] && confirmPassword?.touched" class="error-message">
          Passwords do not match
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Set Password</span>
        <span *ngIf="loading">Saving…</span>
      </button>
    </form>

    <div class="login-footer">
      <p><a routerLink="/auth/login">Back to login</a></p>
    </div>
  </div>
</div>
