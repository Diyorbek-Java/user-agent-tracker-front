<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Employee Monitoring System</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          [class.is-invalid]="email?.invalid && email?.touched"
          placeholder="Enter your email"
        />
        <div *ngIf="email?.invalid && email?.touched" class="error-message">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="password?.invalid && password?.touched"
          placeholder="Enter your password"
        />
        <div *ngIf="password?.invalid && password?.touched" class="error-message">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
        </div>
      </div>

      <div *ngIf="infoMessage" class="alert" style="background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:6px;padding:12px 16px;margin-bottom:20px;">
        {{ infoMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

      <p style="margin-top:14px;text-align:center;font-size:13px;">
        <a routerLink="/auth/forgot-password">Forgot password?</a>
      </p>
    </form>

    <div class="login-footer">
      <p>First time logging in? Use the OTP sent to your email as your password.</p>
      <p style="margin-top:8px;">New organization? <a routerLink="/auth/signup">Create one</a></p>
    </div>
  </div>
</div>
